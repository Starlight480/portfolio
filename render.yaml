services:
  - type: web
    name: nexus-contact-api
    runtime: python
    plan: free
    rootDir: projects/phone-brand/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: RECIPIENT_EMAIL
        value: inaisrael2009@gmail.com
      - key: FLASK_ENV
        value: production
